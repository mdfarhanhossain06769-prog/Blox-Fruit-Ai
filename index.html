<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Fruits Hub | 2026 Meta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #a855f7;
            --neon-blue: #3b82f6;
            --neon-cyan: #22d3ee;
            --deep-bg: #030712;
            --glass-bg: rgba(15, 23, 42, 0.7);
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--deep-bg);
            color: #f8fafc;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 40%);
        }
        .glow-neon-purple {
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }
        .glow-neon-blue {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }
        .text-glow-purple {
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }
        .text-glow-blue {
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.3);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, var(--neon-purple), var(--neon-blue));
            border-radius: 10px;
        }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        @keyframes border-flow {
            0% { border-color: var(--neon-purple); }
            50% { border-color: var(--neon-blue); }
            100% { border-color: var(--neon-purple); }
        }
        .animate-border-flow {
            animation: border-flow 4s infinite linear;
        }
    </style>
<script type="importmap">

</html>
